<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今晚吃什么转盘</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1c2430;
      --muted: #687481;
      --paper: #fffaf2;
      --line: rgba(28, 36, 48, 0.12);
      --accent: #e94f37;
      --accent-2: #178f87;
      --rim: #26313f;
      --shadow: 0 26px 70px rgba(28, 36, 48, 0.18);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 18%, rgba(233, 79, 55, 0.14), transparent 26%),
        radial-gradient(circle at 88% 18%, rgba(23, 143, 135, 0.16), transparent 30%),
        linear-gradient(135deg, #fff7ed 0%, #eefaf8 52%, #fff2f0 100%);
    }

    main {
      width: min(1180px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(340px, 1.12fr) minmax(300px, 0.88fr);
      gap: 30px;
      align-items: center;
      padding: 32px 0;
    }

    .stage {
      display: grid;
      justify-items: center;
      gap: 22px;
    }

    .title {
      width: 100%;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(36px, 6vw, 76px);
      line-height: 0.96;
      letter-spacing: 0;
    }

    .title p {
      max-width: 620px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .wheel-wrap {
      position: relative;
      width: min(88vw, 570px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      filter: drop-shadow(0 28px 34px rgba(34, 39, 46, 0.18));
    }

    .pointer {
      position: absolute;
      top: -2px;
      left: 50%;
      z-index: 5;
      width: 54px;
      height: 70px;
      transform: translateX(-50%);
      filter: drop-shadow(0 8px 10px rgba(28, 36, 48, 0.22));
    }

    .pointer::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 100%, 4% 0, 96% 0);
      background: var(--rim);
      border-radius: 8px;
    }

    .wheel-shell {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #fffaf2;
      border: 12px solid var(--rim);
      box-shadow:
        inset 0 0 0 8px rgba(255, 255, 255, 0.75),
        inset 0 0 0 12px rgba(28, 36, 48, 0.08);
      display: grid;
      place-items: center;
      overflow: hidden;
    }

    .wheel {
      width: calc(100% - 28px);
      height: calc(100% - 28px);
      border-radius: 50%;
      transform: rotate(0deg);
      transition: transform 4.2s cubic-bezier(0.12, 0.72, 0.1, 1);
    }

    .slice {
      stroke: rgba(255, 250, 242, 0.9);
      stroke-width: 2.3;
    }

    .slice-label {
      fill: #fff;
      font-size: 8.2px;
      font-weight: 800;
      text-anchor: middle;
      dominant-baseline: middle;
      paint-order: stroke;
      stroke: rgba(28, 36, 48, 0.32);
      stroke-width: 0.8px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .inner-ring {
      fill: var(--paper);
      stroke: var(--rim);
      stroke-width: 5;
    }

    .hub {
      position: absolute;
      z-index: 6;
      width: 124px;
      aspect-ratio: 1;
      border-radius: 50%;
      border: 8px solid var(--rim);
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.95), transparent 34%),
        #fffaf2;
      display: grid;
      place-items: center;
      color: var(--rim);
      font-size: 22px;
      font-weight: 900;
      box-shadow: 0 14px 28px rgba(28, 36, 48, 0.22);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    .hub:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 18px 34px rgba(28, 36, 48, 0.26);
    }

    .hub:disabled {
      cursor: wait;
      opacity: 0.72;
      transform: none;
    }

    .panel {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 24px;
      backdrop-filter: blur(18px);
    }

    .result {
      min-height: 112px;
      display: grid;
      align-content: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 20px;
      margin-bottom: 20px;
    }

    .result span {
      color: var(--muted);
      font-size: 15px;
    }

    .result strong {
      font-size: clamp(30px, 5vw, 48px);
      line-height: 1.1;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.62;
      transform: none;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .custom-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      min-height: 48px;
      padding: 0 14px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.92);
      font: 16px "Microsoft YaHei", "PingFang SC", sans-serif;
      outline: none;
    }

    input:focus {
      border-color: rgba(23, 143, 135, 0.65);
      box-shadow: 0 0 0 4px rgba(23, 143, 135, 0.12);
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 210px;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 250, 242, 0.62);
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      color: var(--rim);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(28, 36, 48, 0.1);
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 6px 12px rgba(28, 36, 48, 0.06);
    }

    .hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(28, 36, 48, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .modal.is-open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      width: min(420px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.82);
      border-radius: 8px;
      background: #fffaf2;
      box-shadow: 0 26px 80px rgba(28, 36, 48, 0.28);
      padding: 28px;
      text-align: center;
      transform: translateY(12px) scale(0.98);
      transition: transform 0.22s ease;
    }

    .modal.is-open .modal-box {
      transform: translateY(0) scale(1);
    }

    .modal-box span {
      color: var(--muted);
      font-size: 15px;
      font-weight: 700;
    }

    .modal-box strong {
      display: block;
      margin: 12px 0 22px;
      color: var(--accent);
      font-size: clamp(36px, 9vw, 62px);
      line-height: 1.05;
    }

    .modal-box button {
      width: 100%;
      color: #fff;
      background: var(--rim);
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        align-items: start;
        padding-top: 22px;
      }

      .title {
        text-align: center;
      }

      .title p {
        margin: 0 auto;
        font-size: 16px;
      }

      .panel {
        width: 100%;
      }

      .hub {
        width: 102px;
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-label="随机晚餐转盘">
      <div class="title">
        <h1>今晚吃什么？</h1>
        <p>把想吃的都丢进转盘，让选择困难症今晚下班。</p>
      </div>

      <div class="wheel-wrap">
        <div class="pointer" aria-hidden="true"></div>
        <div class="wheel-shell">
          <svg class="wheel" id="wheel" viewBox="0 0 200 200" role="img" aria-label="晚餐随机转盘"></svg>
        </div>
        <button class="hub" id="hub-spin" type="button" aria-label="点击开饭开始转盘">开饭</button>
      </div>
    </section>

    <aside class="panel">
      <div class="result" aria-live="polite">
        <span>今晚安排</span>
        <strong id="result">先转一下</strong>
      </div>

      <div class="custom-row">
        <label for="custom-food">想自己加一个</label>
        <input id="custom-food" type="text" maxlength="16" placeholder="比如：烤冷面">
      </div>
      <p class="hint">菜单已固定内置。这里填一个菜名，会加入当前这一轮候选。</p>

      <label>当前候选</label>
      <div class="chips" id="current-foods" aria-live="polite"></div>
    </aside>
  </main>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <span>今晚就吃</span>
      <strong id="modal-title">火锅</strong>
      <button id="close-modal" type="button">好，就它了</button>
    </div>
  </div>

  <script>
    const palettes = [
      ["#e94f37", "#f6b53f", "#178f87", "#6d5dfc", "#ee7b30", "#2d9cdb", "#db3f7a", "#47a447"],
      ["#d7263d", "#f4a261", "#2f9c95", "#6a4c93", "#118ab2", "#06a77d", "#ff6b35", "#577590"],
      ["#c1121f", "#fca311", "#0081a7", "#00afb9", "#845ec2", "#d45087", "#4d908e", "#3d405b"]
    ];

    const presetFoods = [
      ["火锅", "烤肉", "麻辣烫", "寿司", "螺蛳粉", "炸鸡", "牛肉面", "砂锅粥", "酸菜鱼", "披萨", "粤式点心", "咖喱饭"],
      ["韩式拌饭", "小龙虾", "冒菜", "煲仔饭", "新疆炒米粉", "烤鱼", "越南粉", "汉堡", "云吞面", "铁板烧", "关东煮", "卤肉饭"],
      ["烧烤", "兰州拉面", "黄焖鸡", "日式拉面", "椰子鸡", "海底捞", "饺子", "披萨意面", "沙县小吃", "锅贴", "猪脚饭", "盖浇饭"],
      ["泰式冬阴功", "重庆小面", "羊肉粉", "烤鸭", "东北菜", "海南鸡饭", "炸酱面", "寿喜锅", "轻食沙拉", "肉夹馍", "鱼粉", "炸串"],
      ["米线", "过桥米线", "酸辣粉", "担担面", "刀削面", "油泼面", "肠粉", "烧腊饭", "叉烧饭", "鸡公煲", "干锅", "羊肉串"],
      ["日式便当", "鳗鱼饭", "天妇罗", "章鱼烧", "韩式炸鸡", "部队锅", "石锅拌饭", "冷面", "泰式炒河粉", "咖喱蟹", "越式春卷", "新加坡叻沙"],
      ["墨西哥卷饼", "意大利面", "焗饭", "西班牙海鲜饭", "牛排", "法式可丽饼", "土耳其烤肉", "印度咖喱", "中东烤肉饭", "希腊烤肉卷", "贝果三明治", "热狗"],
      ["蒸菜", "粥铺", "馄饨", "生煎", "小笼包", "锅盔", "凉皮", "麻辣香锅", "串串香", "卤味饭", "铁锅炖", "砂锅粉"],
      ["素食自助", "轻食碗", "鸡胸肉饭", "三明治", "沙拉卷", "燕麦酸奶碗", "蛋包饭", "番茄鸡蛋面", "炒饭", "炒河粉", "炒年糕", "烤冷面"]
    ];

    const foodPool = [...new Set(presetFoods.flat())];

    const wheel = document.querySelector("#wheel");
    const customFoodInput = document.querySelector("#custom-food");
    const currentFoods = document.querySelector("#current-foods");
    const result = document.querySelector("#result");
    const hubSpinButton = document.querySelector("#hub-spin");
    const modal = document.querySelector("#modal");
    const modalTitle = document.querySelector("#modal-title");
    const closeModal = document.querySelector("#close-modal");

    let rotation = 0;
    let spinning = false;
    let paletteIndex = 0;
    let currentMenu = foodPool.slice();

    function getFoods() {
      const customFood = customFoodInput.value.trim();
      const menu = customFood ? [customFood, ...currentMenu] : currentMenu;
      return [...new Set(menu)];
    }

    function renderCurrentFoods(foods) {
      currentFoods.innerHTML = "";
      foods.forEach((food) => {
        const chip = document.createElement("span");
        chip.className = "chip";
        chip.textContent = food;
        currentFoods.appendChild(chip);
      });
    }

    function polarToCartesian(cx, cy, radius, angle) {
      const radians = (angle - 90) * Math.PI / 180;
      return {
        x: cx + radius * Math.cos(radians),
        y: cy + radius * Math.sin(radians)
      };
    }

    function describeSlice(startAngle, endAngle) {
      const start = polarToCartesian(100, 100, 94, endAngle);
      const end = polarToCartesian(100, 100, 94, startAngle);
      const largeArc = endAngle - startAngle <= 180 ? 0 : 1;
      return [
        "M 100 100",
        `L ${start.x.toFixed(3)} ${start.y.toFixed(3)}`,
        `A 94 94 0 ${largeArc} 0 ${end.x.toFixed(3)} ${end.y.toFixed(3)}`,
        "Z"
      ].join(" ");
    }

    function splitLabel(text) {
      if (text.length <= 4) return [text];
      if (text.length <= 8) return [text.slice(0, 4), text.slice(4)];
      return [text.slice(0, 4), text.slice(4, 8), text.slice(8)];
    }

    function addLabel(textNode, label) {
      const lines = splitLabel(label);
      const lineHeight = lines.length === 3 ? 8.2 : 9.4;
      const startDy = -((lines.length - 1) * lineHeight) / 2;
      lines.forEach((line, index) => {
        const tspan = document.createElementNS("http://www.w3.org/2000/svg", "tspan");
        tspan.setAttribute("x", textNode.getAttribute("x"));
        tspan.setAttribute("dy", index === 0 ? startDy : lineHeight);
        tspan.textContent = line;
        textNode.appendChild(tspan);
      });
    }

    function renderWheel() {
      const foods = getFoods();
      const count = Math.max(foods.length, 1);
      const slice = 360 / count;
      const colors = palettes[paletteIndex % palettes.length];
      wheel.innerHTML = "";
      renderCurrentFoods(foods);

      foods.forEach((food, index) => {
        const start = index * slice;
        const end = (index + 1) * slice;
        const middle = start + slice / 2;
        const labelPoint = polarToCartesian(100, 100, count > 40 ? 74 : count > 10 ? 62 : 66, middle);

        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "slice");
        path.setAttribute("d", describeSlice(start, end));
        path.setAttribute("fill", colors[index % colors.length]);
        wheel.appendChild(path);

        const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
        text.setAttribute("class", "slice-label");
        text.setAttribute("x", labelPoint.x.toFixed(2));
        text.setAttribute("y", labelPoint.y.toFixed(2));
        text.style.fontSize = count > 80 ? "3.8px" : count > 40 ? "5.2px" : "";
        addLabel(text, food);
        wheel.appendChild(text);
      });

      const ring = document.createElementNS("http://www.w3.org/2000/svg", "circle");
      ring.setAttribute("class", "inner-ring");
      ring.setAttribute("cx", "100");
      ring.setAttribute("cy", "100");
      ring.setAttribute("r", "26");
      wheel.appendChild(ring);
    }

    function showModal(food) {
      modalTitle.textContent = food;
      modal.classList.add("is-open");
      closeModal.focus();
    }

    function hideModal() {
      modal.classList.remove("is-open");
      hubSpinButton.focus();
    }

    function spinWheel() {
      const foods = getFoods();
      if (spinning || foods.length < 2) {
        result.textContent = foods.length < 2 ? "再加一个菜" : result.textContent;
        return;
      }

      spinning = true;
      hubSpinButton.disabled = true;
      result.textContent = "转动中...";

      const slice = 360 / foods.length;
      const winner = Math.floor(Math.random() * foods.length);
      const targetAngle = 360 - (winner * slice + slice / 2);
      const extraTurns = 5 + Math.floor(Math.random() * 3);
      rotation += extraTurns * 360 + targetAngle - (rotation % 360);
      const finalRotation = ((rotation % 360) + 360) % 360;
      const pointerAngle = (360 - finalRotation) % 360;
      const actualWinner = Math.floor(pointerAngle / slice) % foods.length;
      wheel.style.transform = `rotate(${rotation}deg)`;

      window.setTimeout(() => {
        result.textContent = foods[actualWinner];
        showModal(foods[actualWinner]);
        spinning = false;
        hubSpinButton.disabled = false;
      }, 4300);
    }

    customFoodInput.addEventListener("input", renderWheel);
    hubSpinButton.addEventListener("click", spinWheel);
    closeModal.addEventListener("click", hideModal);
    modal.addEventListener("click", (event) => {
      if (event.target === modal) hideModal();
    });
    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape") hideModal();
    });
    renderWheel();
  </script>
</body>
</html>
